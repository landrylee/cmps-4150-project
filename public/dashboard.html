<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Dashboard</h1>
<button onclick="logout()">Logout</button>

<h2>Notifications</h2>
<div id="notifications"></div>

<h2>Your Topics</h2>
<div id="dashboard"></div>

<h2>All Topics</h2>
<div id="topics"></div>

<h3>Topic Access Statistics</h3>
<pre id="stats"></pre>

<h2>Create Topic</h2>
<input id="topicName">
<button onclick="createTopic()">Create</button>

<h2>Post Message</h2>

<input
  id="msgTopic"
  placeholder="Topic name (example: racing)"
>

<input
  id="msgContent"
  placeholder="Enter your message here"
>

<button onclick="postMessage()">Send</button>

<script src="app.js"></script>
</body>
</html>
